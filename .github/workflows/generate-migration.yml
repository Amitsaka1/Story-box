name: Generate Prisma Migration

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Create migration folder
        run: |
          mkdir -p "prisma/migrations/$(date +%Y%m%d%H%M%S)_init"

      - name: Generate migration SQL
        run: |
          FOLDER=$(ls -d prisma/migrations/*_init)
          npx prisma migrate diff \
            --from-empty \
            --to-schema-datamodel prisma/schema.prisma \
            --script > "$FOLDER/migration.sql"

      - name: Commit migration file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prisma/migrations
          git commit -m "chore: add initial prisma migration" || echo "Nothing to commit"
          git push
